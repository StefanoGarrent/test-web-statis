<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesi Survei | Survei Rawat Jalan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ihc-blue': '#00539C',
                        'ihc-green': '#78BE20',
                        'ihc-orange': '#F26522'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="text-slate-800 min-h-screen flex flex-col bg-[#F4F7FE]">

    <nav id="main-nav" class="fixed w-full top-0 z-50 glass-effect transition-all duration-300">
        <div class="max-w-6xl mx-auto px-4 md:px-6 py-3 md:py-4 flex flex-col sm:flex-row gap-3 sm:gap-0 justify-between sm:items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center shadow-sm border border-slate-100">
                    <i class="ph-bold ph-leaf text-2xl text-ihc-green"></i>
                </div>
                <div class="font-extrabold text-slate-800 text-xl md:text-2xl tracking-tight"><span class="text-ihc-blue">IHC</span> <span class="text-ihc-green">Survei</span></div>
            </div>
            <div class="w-full sm:w-auto flex gap-1 md:gap-2 bg-white p-1 rounded-2xl shadow-sm border border-slate-100 overflow-x-auto no-scrollbar">
                <a href="index.html" class="px-3 md:px-5 py-2 rounded-xl text-slate-600 hover:bg-slate-50 font-semibold text-sm md:text-base flex items-center gap-2 transition whitespace-nowrap shrink-0">
                    <i class="ph-fill ph-squares-four text-lg"></i> Dashboard
                </a>
                <a href="survei.html" class="px-3 md:px-5 py-2 rounded-xl bg-ihc-blue text-white font-semibold text-sm md:text-base flex items-center gap-2 shadow-sm whitespace-nowrap shrink-0">
                    <i class="ph ph-clipboard-text text-lg"></i> Survei
                </a>
                <a href="about.html" class="px-3 md:px-5 py-2 rounded-xl text-slate-600 hover:bg-slate-50 font-semibold text-sm md:text-base flex items-center gap-2 transition whitespace-nowrap shrink-0">
                    <i class="ph ph-info text-lg"></i> About
                </a>
            </div>
        </div>
    </nav>

    <main class="min-h-screen flex items-center justify-center px-4 pt-44 sm:pt-32 pb-12 relative">

        <div class="relative z-10 w-full max-w-4xl">
            <section id="section-input" class="w-full max-w-md mx-auto p-6 md:p-10 bg-white rounded-[2rem] card-shadow border border-slate-100 fade-in">
                <div class="text-center mb-8">
                    <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 mb-2">Identifikasi Pasien</h1>
                    <p class="text-sm text-slate-500">Masukkan nama pasien untuk memulai survei.</p>
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Nama Lengkap Pasien</label>
                        <div class="relative group">
                            <i class="ph ph-user absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 text-xl group-focus-within:text-ihc-blue transition"></i>
                            <input type="text" id="namaPasien" placeholder="Ketik nama di sini..." class="w-full pl-12 pr-4 py-4 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-ihc-blue/20 focus:border-ihc-blue bg-slate-50 focus:bg-white transition text-slate-800 font-semibold text-lg">
                        </div>
                    </div>
                    
                    <div class="flex flex-col gap-3">
                        <button type="button" onclick="bukaLayarSurvei()" class="w-full bg-ihc-blue hover:bg-[#00427c] text-white font-bold py-4 rounded-2xl transition duration-200 shadow-md flex justify-center items-center gap-3 text-lg">
                            <i class="ph-bold ph-monitor-play"></i> Siapkan Layar (Device Kasir)
                        </button>
                        <button type="button" onclick="generateQRCode()" class="w-full bg-white border-2 border-slate-200 hover:border-ihc-blue text-ihc-blue font-bold py-4 rounded-2xl transition duration-200 shadow-sm flex justify-center items-center gap-3 text-lg">
                            <i class="ph-bold ph-qr-code"></i> Generate QR Code (HP Pasien)
                        </button>
                    </div>

                    <div id="qr-container" class="hidden mt-6 flex flex-col items-center justify-center p-6 bg-slate-50 rounded-2xl border border-slate-200 fade-in">
                        <p class="text-sm font-bold text-slate-700 mb-4 text-center">Persilakan pasien scan QR ini:</p>
                        <canvas id="qr-canvas" class="rounded-xl shadow-sm mb-4"></canvas>
                        
                        <div id="polling-indicator" class="flex flex-col items-center justify-center gap-2 mb-4">
                            <i class="ph ph-circle-notch animate-spin text-2xl text-ihc-blue"></i>
                            <p class="text-xs text-ihc-blue font-semibold animate-pulse">Menunggu pasien mengisi...</p>
                        </div>

                        <button type="button" onclick="resetKasir()" class="w-full py-3 bg-red-100 hover:bg-red-200 text-red-600 font-bold rounded-xl transition flex justify-center items-center gap-2">
                            <i class="ph-bold ph-x-circle"></i> Batal / Tutup QR
                        </button>
                    </div>
                </div>
            </section>

            <section id="section-survey" class="hidden w-full max-w-4xl fade-in mx-auto">
                <div class="bg-white rounded-[2rem] card-shadow overflow-hidden border border-slate-100">
                    <div class="bg-ihc-blue text-white p-6 md:p-12 text-center relative">
                        <h2 class="text-3xl md:text-5xl font-extrabold mb-4">Halo, <span id="displayNama" class="text-ihc-green">Pasien</span>!</h2>
                        <p class="text-white/90 text-base md:text-xl font-medium">Bagaimana pengalaman Anda dengan layanan Kasir IHC Rawat Jalan hari ini?</p>
                    </div>

                    <div class="p-6 md:p-14">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <button type="button" onclick="kirimSurvei('Puas')" class="flex flex-col items-center justify-center p-8 md:p-12 bg-gradient-to-b from-white to-ihc-green/5 border-2 border-slate-100 hover:border-ihc-green rounded-[2rem] transition-all duration-300 group shadow-sm hover:shadow-lg">
                                <i class="ph-fill ph-smiley text-7xl md:text-8xl text-ihc-green mb-4 group-hover:scale-110 transition-transform"></i>
                                <span class="text-2xl md:text-3xl font-extrabold text-slate-800">Sangat Puas</span>
                                <p class="text-slate-500 font-medium mt-2">Layanan memuaskan</p>
                            </button>

                            <button type="button" onclick="kirimSurvei('Tidak Puas')" class="flex flex-col items-center justify-center p-8 md:p-12 bg-gradient-to-b from-white to-ihc-orange/5 border-2 border-slate-100 hover:border-ihc-orange rounded-[2rem] transition-all duration-300 group shadow-sm hover:shadow-lg">
                                <i class="ph-fill ph-smiley-sad text-7xl md:text-8xl text-ihc-orange mb-4 group-hover:scale-110 transition-transform"></i>
                                <span class="text-2xl md:text-3xl font-extrabold text-slate-800">Tidak Puas</span>
                                <p class="text-slate-500 font-medium mt-2">Perlu ditingkatkan</p>
                            </button>
                        </div>

                        <div id="loadingIndicator" class="hidden mt-8 text-center text-ihc-blue font-bold flex items-center justify-center gap-2">
                            <i class="ph ph-circle-notch animate-spin text-2xl"></i> Menyimpan tanggapan...
                        </div>
                    </div>
                </div>
            </section>

            <section id="section-thankyou" class="hidden w-full max-w-md mx-auto fade-in">
                <div class="bg-white rounded-[2rem] card-shadow border border-slate-100 p-8 md:p-12 text-center" id="thankyou-content">
                    </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
