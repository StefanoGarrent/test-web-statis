<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | IHC Survei Kepuasan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ihc-blue': '#00539C',
                        'ihc-blue-light': '#3375B0',
                        'ihc-green': '#78BE20',
                        'ihc-teal': '#00A3E0',
                        'ihc-orange': '#F26522'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen flex flex-col">

    <nav id="main-nav" class="fixed w-full top-0 z-50 glass-effect transition-all duration-300">
        <div class="max-w-6xl mx-auto px-4 md:px-6 py-3 md:py-4 flex flex-col sm:flex-row gap-3 sm:gap-0 justify-between sm:items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-ihc-blue shadow-sm border border-slate-100">
                    <i class="ph-bold ph-leaf text-2xl text-ihc-green"></i>
                </div>
                <div class="font-extrabold text-slate-800 text-xl md:text-2xl tracking-tight"><span class="text-ihc-blue">IHC</span> <span class="text-ihc-green">Survei</span> <span class="text-ihc-blue">Kasir Rawat Jalan</span></div>
            </div>
            <div class="w-full sm:w-auto flex gap-1 md:gap-2 bg-white p-1 rounded-2xl shadow-sm border border-slate-100 overflow-x-auto no-scrollbar">
                <a href="index.html" class="px-3 md:px-5 py-2 rounded-xl bg-ihc-blue text-white font-semibold text-sm md:text-base flex items-center gap-2 shadow-sm whitespace-nowrap shrink-0">
                    <i class="ph-fill ph-squares-four text-lg"></i> Dashboard
                </a>
                <a href="survei.html" class="px-3 md:px-5 py-2 rounded-xl text-slate-600 hover:bg-slate-50 font-semibold text-sm md:text-base flex items-center gap-2 transition whitespace-nowrap shrink-0">
                    <i class="ph ph-clipboard-text text-lg"></i> Survei
                </a>
                <a href="about.html" class="px-3 md:px-5 py-2 rounded-xl text-slate-600 hover:bg-slate-50 font-semibold text-sm md:text-base flex items-center gap-2 transition whitespace-nowrap shrink-0">
                    <i class="ph ph-info text-lg"></i> About
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center pt-44 sm:pt-32 pb-12 px-4 relative">
        <section class="w-full max-w-5xl fade-in">
            <div class="relative mb-8 p-6 sm:p-8 md:p-12 bg-gradient-to-r from-ihc-blue via-[#0070c0] to-ihc-teal text-white rounded-[2rem] shadow-lg overflow-hidden">
                <div class="absolute top-0 right-0 w-80 h-80 bg-white/10 rounded-full -translate-y-1/2 translate-x-1/3 blur-2xl"></div>
                <div class="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div>
                        <div class="flex items-center gap-3 mb-2">
                            <h2 class="text-3xl sm:text-4xl md:text-5xl font-extrabold tracking-tight">Performa Layanan</h2>
                        </div>
                        <p class="text-white/90 text-base md:text-lg flex items-center gap-2 font-medium">
                            <i class="ph-fill ph-check-circle text-xl text-ihc-green"></i> Data tersinkronisasi secara real-time
                        </p>
                    </div>
                    <button id="btn-refresh" onclick="loadDashboardData()" class="px-6 py-3 bg-white/20 hover:bg-white/30 backdrop-blur-md rounded-xl font-bold transition-all flex items-center gap-2 text-white border border-white/30">
                        <i class="ph-bold ph-arrows-clockwise text-xl"></i> Refresh
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 md:p-8 rounded-[1.5rem] card-shadow relative overflow-hidden group border border-slate-100">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-14 h-14 bg-ihc-blue/10 rounded-2xl flex items-center justify-center text-ihc-blue">
                            <i class="ph-fill ph-users text-3xl"></i>
                        </div>
                    </div>
                    <p class="text-sm text-slate-500 font-bold mb-1 uppercase tracking-wide">Total Responden</p>
                    <h3 id="statTotal" class="text-4xl md:text-5xl font-extrabold text-slate-800 counter-animate">0</h3>
                </div>

                <div class="bg-white p-6 md:p-8 rounded-[1.5rem] card-shadow relative overflow-hidden group border border-slate-100">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-14 h-14 bg-ihc-green/10 rounded-2xl flex items-center justify-center text-ihc-green">
                            <i class="ph-fill ph-smiley text-3xl"></i>
                        </div>
                    </div>
                    <p class="text-sm text-slate-500 font-bold mb-1 uppercase tracking-wide">Pasien Puas</p>
                    <h3 id="statPuas" class="text-4xl md:text-5xl font-extrabold text-slate-800 counter-animate">0</h3>
                </div>

                <div class="bg-white p-6 md:p-8 rounded-[1.5rem] card-shadow relative overflow-hidden group border border-slate-100">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-14 h-14 bg-ihc-orange/10 rounded-2xl flex items-center justify-center text-ihc-orange">
                            <i class="ph-fill ph-smiley-sad text-3xl"></i>
                        </div>
                    </div>
                    <p class="text-sm text-slate-500 font-bold mb-1 uppercase tracking-wide">Tidak Puas</p>
                    <h3 id="statTidakPuas" class="text-4xl md:text-5xl font-extrabold text-slate-800 counter-animate">0</h3>
                </div>
            </div>

            <div class="bg-white rounded-[1.5rem] p-6 md:p-8 card-shadow border border-slate-100">
                <div class="mb-6 flex justify-between items-center">
                    <div>
                        <h3 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                            Persentase Kepuasan
                        </h3>
                    </div>
                </div>
                <div class="flex justify-center">
                    <div class="w-full max-w-sm">
                        <canvas id="kepuasanChart"></canvas>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
